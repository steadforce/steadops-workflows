# Scan for leaked secrets using Trufflehog OSS before they reach the main branch.
name: Trufflehog secret scan

on:
  workflow_call:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Scan with Trufflehog
      run: |
        docker run --rm -v "$GITHUB_WORKSPACE:/pwd" \
          trufflesecurity/trufflehog:latest \
          git file:///pwd
